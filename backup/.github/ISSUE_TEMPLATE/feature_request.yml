name: Feature request
description: Suggest an improvement or new capability for ShellDesk.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement for ShellDesk.

        Please describe the workflow and outcome rather than sharing real credentials, private infrastructure details, private keys, tokens, or other sensitive data.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submit checklist
      options:
        - label: I have searched existing issues and did not find a duplicate request.
          required: true
        - label: This request does not include credentials, private keys, tokens, or sensitive host information.
          required: true

  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      options:
        - New feature
        - Improvement to existing feature
        - UX / visual design improvement
        - Performance improvement
        - Security / privacy improvement
        - Developer experience / build tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: feature_area
    attributes:
      label: Related area
      options:
        - Host management / vault
        - SSH connection / jump host
        - Terminal
        - SFTP / file explorer
        - Remote desktop / window manager
        - Browser / webview
        - VNC
        - Database tools
        - Process / service / container tools
        - Network / firewall / disk / package tools
        - AI settings / chat
        - Sync / import / export
        - Build / packaging / release
        - UI / theme / layout
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to accomplish, and what is difficult today?
      placeholder: |
        When managing multiple SSH hosts, I want to ...
        Today this is hard because ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, settings, commands, or integration you would like ShellDesk to provide.
      placeholder: |
        Add ...
        The user should be able to ...
        It should work with ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention current workarounds, other tools, or different designs you considered.
    validations:
      required: false

  - type: textarea
    id: platform_scope
    attributes:
      label: Platform and remote system scope
      description: Note local OS, remote OS, shell, service, database, or protocol requirements if the request is platform-specific.
      placeholder: |
        Local OS: Windows / macOS / Linux / all
        Remote OS: Linux / Windows / macOS / all
        Related service/protocol: SSH / SFTP / VNC / MySQL / Redis / etc.
    validations:
      required: false

  - type: textarea
    id: ux_notes
    attributes:
      label: UX notes or examples
      description: Attach sketches, screenshots, references, or describe expected controls and states.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to your workflow?
      options:
        - Nice to have
        - Important
        - Blocking a workflow
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Optional checklist for how we can tell this is done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
