name: Bug report
description: Report a reproducible problem in ShellDesk.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ShellDesk.

        Please do not include SSH passwords, private keys, passphrases, API keys, server secrets, or sensitive host details. Mask IPs, domains, usernames, and paths when needed.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submit checklist
      options:
        - label: I have searched existing issues and did not find a duplicate.
          required: true
        - label: I have removed or masked credentials, private keys, tokens, and sensitive host information.
          required: true

  - type: input
    id: version
    attributes:
      label: ShellDesk version
      description: Use the release version, commit SHA, or branch name.
      placeholder: "v1.0.0 / main@abcdef1"
    validations:
      required: true

  - type: dropdown
    id: app_mode
    attributes:
      label: How are you running ShellDesk?
      options:
        - Packaged release
        - pnpm dev
        - Built from source
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Local operating system
      description: The OS where ShellDesk is running.
      options:
        - Windows x64
        - Windows arm64
        - macOS
        - Linux x64
        - Linux arm64
        - Other
    validations:
      required: true

  - type: textarea
    id: remote_environment
    attributes:
      label: Remote environment
      description: Include the remote OS/distribution, SSH server, shell, database/service version, or browser/VNC details if relevant. Do not include credentials.
      placeholder: |
        Remote OS: Ubuntu 24.04
        SSH server: OpenSSH
        Feature area: SFTP / Terminal / VNC / MySQL / Settings / etc.
    validations:
      required: false

  - type: dropdown
    id: feature_area
    attributes:
      label: Affected area
      options:
        - Host management / vault
        - SSH connection / jump host
        - Terminal
        - SFTP / file explorer
        - Remote desktop / window manager
        - Browser / webview
        - VNC
        - Database tools
        - Process / service / container tools
        - Network / firewall / disk / package tools
        - AI settings / chat
        - Sync / import / export
        - Build / packaging / release
        - UI / theme / layout
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use clear numbered steps. Include any relevant settings, host options, auth method, jump host setup, or remote tool being used.
      placeholder: |
        1. Add a host with ...
        2. Open ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead? Include exact error messages when safe.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Attach screenshots or paste relevant logs. Mask credentials, private keys, tokens, IPs, domains, usernames, and private paths when needed.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add possible regression info, workarounds, frequency, impact, or anything else that helps diagnose the issue.
      placeholder: |
        Frequency: always / sometimes / once
        Last known working version:
        Workaround:
    validations:
      required: false
