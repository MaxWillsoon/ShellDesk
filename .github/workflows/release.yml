name: build-packages

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub Release after build"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: build-packages-${{ github.workflow }}-${{ github.ref_type }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  STRICT_VERSION_RE: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[A-Za-z][0-9A-Za-z-]*|[0-9A-Za-z][0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[A-Za-z][0-9A-Za-z-]*|[0-9A-Za-z][0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?$'

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            pack_script: pack:mac
          - name: windows
            os: windows-latest
            pack_script: pack:win-x64
          - name: linux-x64
            os: ubuntu-22.04
            pack_script: pack:linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Read package version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "$VERSION" =~ $STRICT_VERSION_RE ]]; then
            echo "::error::package.json version must be MAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH-prerelease."
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/v* && "$GITHUB_REF_NAME" != "v${VERSION}" ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}. Expected v${VERSION}."
            exit 1
          fi
          echo "PACKAGE_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Using package.json version ${VERSION}"

      - name: Build package
        env:
          ELECTRON_BUILDER_PUBLISH: "never"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm run ${{ matrix.pack_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: shelldesk-${{ matrix.name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v')
      && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release))
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate package version and release tag
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "$VERSION" =~ $STRICT_VERSION_RE ]]; then
            echo "::error::package.json version must be MAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH-prerelease."
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "v${VERSION}" ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}. Expected v${VERSION}."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate Release Body
        run: node .github/scripts/generate-release-note.js
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.yml
            artifacts/*.blockmap
          generate_release_notes: true
          fail_on_unmatched_files: false
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
